              '<div class="data-card"><div class="dc-label">Egg Sorter</div><div class="dc-value" style="font-size:.95rem">' +
              esc(eg.eggSorter) +
              "</div></div>";
          html += "</div>";
          html +=
            '<table class="data-table"><thead><tr><th>Egg Size</th><th>Cases</th><th>Trays</th><th>Pieces</th></tr></thead><tbody>';
          var etC = 0,
            etT = 0,
            etP = 0;
          for (var ei2 = 0; ei2 < EGG_SIZES.length; ei2++) {
            var ek2 = EGG_SIZES[ei2][0],
              el2 = EGG_SIZES[ei2][1];
            var ed2 = edist[ek2] || {};
            var ec = ed2.cases || 0,
              et2 = ed2.trays || 0,
              ep = ed2.pieces || 0;
            if (ec || et2 || ep) {
              html +=
                "<tr><td>" +
                el2 +
                "</td><td>" +
                num(ec) +
                "</td><td>" +
                num(et2) +
                "</td><td>" +
                num(ep) +
                "</td></tr>";
              etC += ec;
              etT += et2;
              etP += ep;
            }
          }
          html +=
            '<tr class="total-row"><td>TOTAL</td><td>' +
            num(etC) +
            "</td><td>" +
            num(etT) +
            "</td><td>" +
            num(etP) +
            "</td></tr>";
          html += "</tbody></table></div>";
        }

        /* ── MORTALITY PANE ── */
        if (hasMort) {
          var mt = mort;
          var mrows = mt.mortality || [];
          html +=
            '<div class="section-pane' +
            (_activeSection === "mortality" ? " active" : "") +
            '" data-s="mortality">';
          html += '<div class="data-grid" style="margin-bottom:14px">';
          html +=
            '<div class="data-card warning"><div class="dc-label">Total Mortality</div><div class="dc-value">' +
            num(mt.totalMortality) +
            "</div></div>";
          html +=
            '<div class="data-card"><div class="dc-label">Reporter</div><div class="dc-value" style="font-size:.95rem">' +
            esc(mt.reporter || "\u2014") +
            "</div></div>";
          html += "</div>";
          if (mrows.length) {
            html +=
              '<table class="data-table"><thead><tr><th>Cause</th><th>Count</th><th>Notes</th></tr></thead><tbody>';
            for (var mi3 = 0; mi3 < mrows.length; mi3++)
              html +=
                "<tr><td>" +
                esc(mrows[mi3].cause || "") +
                "</td><td>" +
                (mrows[mi3].count != null ? mrows[mi3].count : 0) +
                '</td><td class="notes-cell">' +
                esc(mrows[mi3].notes || "") +
                "</td></tr>";
            html += "</tbody></table>";
          }
          if (mt.notes)
            html +=
              '<div class="notes-card"><div class="notes-label">Mortality Notes</div>' +
              esc(mt.notes) +
              "</div>";
          html += "</div>";
        }

        /* ── MEDICATION PANE ── */
        if (hasMed) {
          var mdd = med;
          var mdrows = mdd.medication || [];
          html +=
            '<div class="section-pane' +
            (_activeSection === "medication" ? " active" : "") +
            '" data-s="medication">';
          html += '<div class="data-grid" style="margin-bottom:14px">';
          html +=
            '<div class="data-card"><div class="dc-label">Medications Given</div><div class="dc-value">' +
            mdrows.length +
            "</div></div>";
          html +=
            '<div class="data-card"><div class="dc-label">Reporter</div><div class="dc-value" style="font-size:.95rem">' +
            esc(mdd.reporter || "\u2014") +
            "</div></div>";
          html += "</div>";
          if (mdrows.length) {
            html +=
              '<table class="data-table"><thead><tr><th>Drug</th><th>Dosage</th><th>Route</th><th>Qty</th><th>Notes</th></tr></thead><tbody>';
            for (var mi4 = 0; mi4 < mdrows.length; mi4++)
              html +=
                "<tr><td><strong>" +
                esc(mdrows[mi4].drug || "") +
                "</strong></td><td>" +
                esc(mdrows[mi4].dosage || "") +
                "</td><td>" +
                esc(mdrows[mi4].route || "") +
                "</td><td>" +
                (mdrows[mi4].qty != null ? mdrows[mi4].qty : "") +
                '</td><td class="notes-cell">' +
                esc(mdrows[mi4].notes || "") +
                "</td></tr>";
            html += "</tbody></table>";
          }
          if (mdd.notes)
            html +=
              '<div class="notes-card"><div class="notes-label">Medication Notes</div>' +
              esc(mdd.notes) +
              "</div>";
          html += "</div>";
        }

        if (!hasAny) {
          html +=
            '<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">No entries recorded for this building on this date.</div></div>';
        }

        el.innerHTML = html;

        // Wire section tabs
        el.querySelectorAll(".section-tab").forEach(function (btn) {
          btn.addEventListener("click", function () {
            _activeSection = btn.dataset.s;
            el.querySelectorAll(".section-tab").forEach(function (t) {
              t.classList.toggle("active", t.dataset.s === _activeSection);
            });
            el.querySelectorAll(".section-pane").forEach(function (p) {
              p.classList.toggle("active", p.dataset.s === _activeSection);
            });
          });
        });
      }

      /* Load + render */
      async function loadAndRender() {
        var date = _manifest.dates[_activeDateIdx];
        if (!date) return;
        renderDateStrip();
        populateYearMonth();
        document.getElementById("building-content").innerHTML =
          '<div class="loading-state"><div class="spinner"></div>Loading\u2026</div>';
        try {
          _data = await loadDay(date);
          var syncEl = document.getElementById("sync-time");
          if (_data.syncedAt)
            syncEl.textContent =
              "Synced " + new Date(_data.syncedAt).toLocaleString();
          renderSummary(_data);
          renderBuildingList();
          renderBuildingContent();
        } catch (e) {
          document.getElementById("summary-strip").innerHTML = "";
          document.getElementById("building-list").innerHTML =
            '<li class="sidebar-empty">Load failed.</li>';
          document.getElementById("building-content").innerHTML =
            '<div class="empty-state"><div class="empty-icon">&#9888;</div><div class="empty-text">Failed to load data for ' +
            esc(date) +
            ".</div></div>";
        }
      }

      /* Init */
      async function init() {
        _manifest = await loadManifest();
        if (!_manifest.dates.length) {
          document.getElementById("date-strip").innerHTML =
            '<span style="color:var(--muted);font-size:.84rem;padding:8px 0">No data synced yet.</span>';
          document.getElementById("building-list").innerHTML =
            '<li class="sidebar-empty">No data yet.</li>';
          document.getElementById("building-content").innerHTML =
            '<div class="empty-state"><div class="empty-icon">&#128466;</div><div class="empty-text">No data has been synced yet.<br>Use <strong>Sync Data</strong> in LayerHub to push data here.</div></div>';
          return;
        }
        _activeDateIdx = 0;
        populateYearMonth();
        document
          .getElementById("sel-year")
          .addEventListener("change", function () {
            var y = document.getElementById("sel-year").value;
            var selM = document.getElementById("sel-month");
            var months = [];
            for (var i = 0; i < _manifest.dates.length; i++) {
              if (_manifest.dates[i].indexOf(y) === 0) {
                var m = _manifest.dates[i].slice(5, 7);
                if (months.indexOf(m) < 0) months.push(m);
              }
            }
            var mhtml = "";
            for (var j = 0; j < months.length; j++)
              mhtml +=
                '<option value="' +
                months[j] +
                '">' +
                monthName(months[j]) +
                "</option>";
            selM.innerHTML = mhtml;
            onYearMonthChange();
          });
        document
          .getElementById("sel-month")
          .addEventListener("change", onYearMonthChange);
        document
          .querySelectorAll(".sidebar-filter-btn")
          .forEach(function (btn) {
            btn.addEventListener("click", function () {
              document
                .querySelectorAll(".sidebar-filter-btn")
                .forEach(function (b) {
                  b.classList.remove("active");
                });
              btn.classList.add("active");
              _buildingFilter = btn.dataset.filter;
              renderBuildingList();
              renderBuildingContent();
            });
          });
        await loadAndRender();
      }

      init();
    </script>
  </body>
</html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LayerHub Dashboard</title>
    <style>
      :root {
        --clr: #16a34a;
        --clr-dark: #15803d;
        --clr-light: #dcfce7;
        --clr-bg: #f0fdf4;
        --bg: #f8fafc;
        --card: #fff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --radius: 12px;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08);
        font-size: 15px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Header ── */
      .header {
        background: linear-gradient(
          135deg,
          #15803d 0%,
          #16a34a 50%,
          #22c55e 100%
        );
        color: #fff;
        padding: 0 24px;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 14px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(21, 128, 61, 0.25);
      }
      .header-logo {
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
      }
      .header h1 {
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .header h1 span {
        font-weight: 400;
        opacity: 0.8;
      }
      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .sync-badge {
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        backdrop-filter: blur(4px);
      }

      /* ── Toolbar ── */
      .toolbar {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .date-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .date-nav button {
        width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .date-nav button:hover {
        background: var(--clr-light);
        border-color: var(--clr);
      }
      .date-select {
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.9rem;
        font-family: inherit;
        background: var(--card);
        cursor: pointer;
        min-width: 150px;
      }
      .date-select:focus {
        outline: none;
        border-color: var(--clr);
        box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
      }
      .building-count {
        font-size: 0.82rem;
        color: var(--muted);
        margin-left: auto;
      }

      /* ── Container ── */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 24px 40px;
      }

      /* ── Summary strip ── */
      .summary-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .summary-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        box-shadow: var(--shadow);
      }
      .summary-card .label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .summary-card .value {
        font-size: 1.35rem;
        font-weight: 700;
        color: var(--clr-dark);
      }
      .summary-card .sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }

      /* ── Building tabs ── */
      .building-tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 2px;
        margin-bottom: 20px;
        scrollbar-width: none;
      }
      .building-tabs::-webkit-scrollbar {
        display: none;
      }
      .building-tab {
        padding: 8px 18px;
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 10px;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: var(--shadow);
      }
      .building-tab:hover {
        border-color: var(--clr);
        background: var(--clr-light);
      }
      .building-tab.active {
        background: var(--clr);
        color: #fff;
        border-color: var(--clr);
        box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
      }
      .building-tab .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
      }
      .building-tab.active .dot {
        background: #86efac;
      }
      .building-tab.culled .dot {
        background: #fca5a5;
      }

      /* ── Section tabs ── */
      .section-tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--border);
        margin-bottom: 20px;
      }
      .section-tab {
        padding: 10px 20px;
        background: none;
        border: none;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .section-tab:hover {
        color: var(--text);
      }
      .section-tab.active {
        color: var(--clr-dark);
        border-bottom-color: var(--clr);
        font-weight: 600;
      }
      .section-tab .icon {
        font-size: 1.1rem;
      }
      .section-pane {
        display: none;
        animation: fadeIn 0.2s;
      }
      .section-pane.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ── Building header card ── */
      .building-header {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: var(--shadow);
      }
      .building-header .bh-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--clr-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
      }
      .building-header .bh-info {
        flex: 1;
      }
      .building-header .bh-name {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .building-header .bh-meta {
        font-size: 0.82rem;
        color: var(--muted);
        display: flex;
        gap: 16px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .building-header .bh-meta span {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .badge {
        font-size: 0.7rem;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 600;
      }
      .badge-active {
        background: var(--clr-light);
        color: var(--clr-dark);
      }
      .badge-culled {
        background: #fee2e2;
        color: #dc2626;
      }

      /* ── Data cards grid ── */
      .data-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .data-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        box-shadow: var(--shadow);
        transition: box-shadow 0.15s;
      }
      .data-card:hover {
        box-shadow: var(--shadow-lg);
      }
      .data-card .dc-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .data-card .dc-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
      }
      .data-card .dc-sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .data-card.highlight {
        border-left: 3px solid var(--clr);
      }
      .data-card.warning {
        border-left: 3px solid #f59e0b;
      }

      /* ── Tables ── */
      .data-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
      }
      .data-table th {
        background: var(--clr-bg);
        color: var(--clr-dark);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 10px 14px;
        text-align: left;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .data-table td {
        padding: 10px 14px;
        font-size: 0.85rem;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: top;
      }
      .data-table tbody tr:last-child td {
        border-bottom: none;
      }
      .data-table tbody tr:hover {
        background: #fafffe;
      }
      .data-table .total-row {
        background: var(--clr-bg);
        font-weight: 700;
      }
      .data-table .total-row td {
        border-top: 2px solid var(--clr);
        color: var(--clr-dark);
      }
      .data-table .notes-cell {
        max-width: 200px;
        color: var(--muted);
        font-style: italic;
      }

      /* ── Notes card ── */
      .notes-card {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: var(--radius);
        padding: 14px 18px;
        margin-bottom: 16px;
        font-size: 0.85rem;
        line-height: 1.6;
      }
      .notes-card .notes-label {
        font-weight: 600;
        color: #92400e;
        margin-bottom: 4px;
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      /* ── Empty / Loading ── */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
      }
      .empty-state .empty-icon {
        font-size: 3rem;
        margin-bottom: 12px;
        opacity: 0.4;
      }
      .empty-state .empty-text {
        color: var(--muted);
        font-size: 0.95rem;
        max-width: 400px;
        margin: 0 auto;
      }
      .loading-state {
        text-align: center;
        padding: 80px 20px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--clr);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Print ── */
      @media print {
        .header,
        .toolbar,
        .building-tabs,
        .section-tabs {
          display: none !important;
        }
        .container {
          padding: 0;
        }
        .report-sheet {
          box-shadow: none !important;
          border: none !important;
        }
      }

      /* ── Report sheet ── */
      .report-sheet {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 20px 24px;
        font-family: "Consolas", "Courier New", "Liberation Mono", monospace;
        font-size: 0.88rem;
        line-height: 1.4;
        color: var(--text);
        max-width: 720px;
        margin: 0 auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .report-sheet .report-title {
        text-align: center;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--clr-dark);
        margin-bottom: 0;
      }
      .report-sheet .report-date {
        text-align: center;
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0;
        color: var(--text);
      }
      .report-sheet .report-meta {
        margin-bottom: 0;
        color: var(--muted);
      }
      .report-sheet .report-divider {
        border: none;
        margin: 2px 0;
        height: 0;
      }
      .report-sheet .report-section-label {
        font-weight: 700;
        color: var(--clr-dark);
        margin-top: 0;
        margin-bottom: 0;
        text-decoration: none;
      }
      .report-sheet .report-bldg-header {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--clr-dark);
        background: none;
        padding: 0;
        border-radius: 0;
        margin-bottom: 0;
        display: inline-block;
      }
      .report-sheet .report-row {
        display: flex;
        gap: 4px;
      }
      .report-sheet .report-row .rl {
        min-width: 110px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .report-sheet .report-row .rv {
        font-weight: 600;
      }
      .report-sheet .egg-table {
        width: 100%;
        border-collapse: collapse;
        margin: 2px 0 4px;
        font-family: inherit;
        font-size: 0.84rem;
      }
      .report-sheet .egg-table th {
        text-align: left;
        font-weight: 700;
        color: var(--clr-dark);
        border-bottom: none;
        padding: 2px 8px 2px 0;
      }
      .report-sheet .egg-table td {
        padding: 1px 8px 1px 0;
        border-bottom: none;
      }
      .report-sheet .egg-table tr:last-child td {
        border-bottom: none;
      }
      .report-sheet .egg-table .egg-total td {
        font-weight: 700;
        border-top: none;
        color: var(--clr-dark);
      }
      .report-sheet .report-none {
        color: #94a3b8;
        font-style: italic;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .container {
          padding: 14px;
        }
        .summary-strip {
          grid-template-columns: repeat(2, 1fr);
        }
        .data-grid {
          grid-template-columns: 1fr 1fr;
        }
        .building-header .bh-meta {
          gap: 8px;
        }
        .data-table {
          font-size: 0.8rem;
        }
        .data-table th,
        .data-table td {
          padding: 8px 10px;
        }
      }
      @media (max-width: 480px) {
        .summary-strip {
          grid-template-columns: 1fr;
        }
        .data-grid {
          grid-template-columns: 1fr;
        }
        .toolbar {
          padding: 10px 14px;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-logo">&#129361;</div>
      <h1>LayerHub <span>Dashboard</span></h1>
      <div class="header-right">
        <span class="sync-badge" id="sync-time">—</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="date-nav">
        <button id="btn-prev" title="Previous date">&#9664;</button>
        <select class="date-select" id="date-select">
          <option>Loading…</option>
        </select>
        <button id="btn-next" title="Next date">&#9654;</button>
      </div>
      <span class="building-count" id="building-count"></span>
    </div>

    <div class="container">
      <!-- Summary KPIs -->
      <div class="summary-strip" id="summary-strip"></div>

      <!-- Building tabs -->
      <div class="building-tabs" id="building-tabs"></div>

      <!-- Building content -->
      <div id="building-content"></div>
    </div>

    <script>
      const dataDir = "data";

      const EGG_SIZES = [
        ["nnv", "NNV"],
        ["nv", "NV"],
        ["no_weight", "No Weight"],
        ["pullet", "Pullet"],
        ["pewee", "Pewee"],
        ["small", "Small"],
        ["medium", "Medium"],
        ["large", "Large"],
        ["larger", "Larger"],
        ["xlarge", "X-Large"],
        ["jumbo", "Jumbo"],
        ["s_jumbo", "S-Jumbo"],
        ["broken", "Broken"],
        ["bold", "Bold"],
        ["loss", "Loss"],
        ["reject", "Reject"],
        ["good_cracks", "Good Cracks"],
        ["bad_cracks", "Bad Cracks"],
        ["misshapen", "Misshapen"],
      ];

      let _data = null;
      let _activeBuilding = null;
      let _activeSection = "report";

      /* ── Data loading ── */
      async function loadManifest() {
        try {
          const r = await fetch(`${dataDir}/manifest.json`);
          if (!r.ok) throw 0;
          return await r.json();
        } catch {
          return { dates: [] };
        }
      }
      async function loadDay(d) {
        const r = await fetch(`${dataDir}/${d}.json`);
        if (!r.ok) throw 0;
        return await r.json();
      }

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function num(n) {
        return (n ?? 0).toLocaleString();
      }

      /* ── Summary strip ── */
      function renderSummary(data) {
        const el = document.getElementById("summary-strip");
        const prods = data.entries.filter((e) => e.type === "production");
        const totalPieces = prods.reduce(
          (s, p) => s + (p.production?.totalPieces ?? 0),
          0,
        );
        const totalHeads = prods.reduce((s, p) => s + (p.currentHeads ?? 0), 0);
        const totalMort = prods.reduce(
          (s, p) => s + (p.mortalityCount ?? 0),
          0,
        );
        const totalFeed = prods.reduce((s, p) => s + (p.feed?.bags ?? 0), 0);
        const eggs = data.entries.filter((e) => e.type === "egg-summary");
        const totalEggPcs = eggs.reduce((s, e) => s + (e.totalPieces ?? 0), 0);
        const pct =
          totalHeads > 0 ? ((totalPieces / totalHeads) * 100).toFixed(1) : "—";
        const buildings = new Set(prods.map((p) => p.buildingId)).size;

        el.innerHTML = `
    <div class="summary-card"><div class="label">Total Production</div><div class="value">${num(totalPieces)}</div><div class="sub">pieces across ${buildings} building${buildings !== 1 ? "s" : ""}</div></div>
    <div class="summary-card"><div class="label">Production Rate</div><div class="value">${pct}%</div><div class="sub">eggs per bird</div></div>
    <div class="summary-card"><div class="label">Total Heads</div><div class="value">${num(totalHeads)}</div><div class="sub">current flock size</div></div>
    <div class="summary-card"><div class="label">Mortality</div><div class="value">${num(totalMort)}</div><div class="sub">total deaths today</div></div>
    <div class="summary-card"><div class="label">Feed Consumed</div><div class="value">${num(totalFeed)}</div><div class="sub">bags</div></div>
    <div class="summary-card"><div class="label">Egg Sorted</div><div class="value">${num(totalEggPcs)}</div><div class="sub">pieces sorted</div></div>
  `;
      }

      /* ── Building tabs ── */
      function renderBuildingTabs(data) {
        const el = document.getElementById("building-tabs");
        const byBuilding = groupByBuilding(data);
        const bMap = buildingMap(data);
        const ids = Object.keys(byBuilding);
        document.getElementById("building-count").textContent =
          `${ids.length} building${ids.length !== 1 ? "s" : ""} with data`;

        if (!ids.length) {
          el.innerHTML = "";
          return;
        }
        if (!_activeBuilding || !ids.includes(_activeBuilding))
          _activeBuilding = ids[0];

        el.innerHTML = ids
          .map((id) => {
            const b = bMap[id] || {};
            const culled = b.culledAt ? " culled" : "";
            const active = id === _activeBuilding ? " active" : "";
            return `<button class="building-tab${active}${culled}" data-id="${id}"><span class="dot"></span>${esc(b.name || id)}</button>`;
          })
          .join("");

        el.querySelectorAll(".building-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            _activeBuilding = btn.dataset.id;
            renderBuildingTabs(data);
            renderBuildingContent(data);
          });
        });
      }

      function groupByBuilding(data) {
        const g = {};
        for (const e of data.entries) {
          if (!g[e.buildingId]) g[e.buildingId] = [];
          g[e.buildingId].push(e);
        }
        return g;
      }
      function buildingMap(data) {
        const m = {};
        for (const b of data.buildings || []) m[b.id] = b;
        return m;
      }

      /* ── Building content ── */
      function renderBuildingContent(data) {
        const el = document.getElementById("building-content");
        const byBuilding = groupByBuilding(data);
        const bMap = buildingMap(data);
        const entries = byBuilding[_activeBuilding] || [];
        const b = bMap[_activeBuilding] || {};

        const prod = entries.find((e) => e.type === "production");
        const mort = entries.find((e) => e.type === "mortality");
        const egg = entries.find((e) => e.type === "egg-summary");
        const med = entries.find((e) => e.type === "medication");

        const hasProd = !!prod,
          hasMort = !!(mort && (mort.mortality?.length || mort.notes)),
          hasEgg = !!egg,
          hasMed = !!(med && (med.medication?.length || med.notes));
        const hasAny = hasProd || hasMort || hasEgg || hasMed;

        let html = "";

        // Building header
        const badgeClass = b.culledAt ? "badge-culled" : "badge-active";
        const badgeText = b.culledAt ? "Culled" : "Active";
        const age = prod
          ? `${prod.ageWeeks ?? "?"}w ${prod.ageDays ?? 0}d`
          : b.ageWeeks != null
            ? `${b.ageWeeks}w ${b.ageDays ?? 0}d`
            : "—";
        html += `<div class="building-header">
    <div class="bh-icon">&#127969;</div>
    <div class="bh-info">
      <div class="bh-name">${esc(b.name || _activeBuilding)} <span class="badge ${badgeClass}">${badgeText}</span></div>
      <div class="bh-meta">
        <span>&#129415; ${esc(b.breed || "—")}</span>
        <span>&#128197; Age: ${age}</span>
        <span>&#128101; Starting: ${num(b.startingHeads)}</span>
        <span>&#128100; Flockman: ${esc(b.flockman || "—")}</span>
      </div>
    </div>
  </div>`;

        // Section tabs — Report is always first
        html += `<div class="section-tabs">
    ${hasAny ? `<button class="section-tab${_activeSection === "report" ? " active" : ""}" data-s="report"><span class="icon">&#128221;</span>Daily Report</button>` : ""}
    ${hasProd ? `<button class="section-tab${_activeSection === "production" ? " active" : ""}" data-s="production"><span class="icon">&#128202;</span>Production</button>` : ""}
    ${hasMort ? `<button class="section-tab${_activeSection === "mortality" ? " active" : ""}" data-s="mortality"><span class="icon">&#128203;</span>Mortality</button>` : ""}
    ${hasEgg ? `<button class="section-tab${_activeSection === "egg" ? " active" : ""}" data-s="egg"><span class="icon">&#129370;</span>Egg Summary</button>` : ""}
    ${hasMed ? `<button class="section-tab${_activeSection === "medication" ? " active" : ""}" data-s="medication"><span class="icon">&#128138;</span>Medication</button>` : ""}
  </div>`;

        // ─── Report pane (Daily Report) ───
        if (hasAny) {
          const dateObj = data.date
            ? new Date(data.date + "T00:00:00")
            : new Date();
          const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
          const yyyy = dateObj.getFullYear();
          const mm = String(dateObj.getMonth() + 1).padStart(2, "0");
          const dd = String(dateObj.getDate()).padStart(2, "0");
          const dayName = days[dateObj.getDay()];
          const reporter =
            prod?.reporter || mort?.reporter || med?.reporter || "—";
          const sorter = prod?.eggSorter || egg?.eggSorter || "";

          html += `<div class="section-pane${_activeSection === "report" ? " active" : ""}" data-s="report">
<div class="report-sheet">
<div class="report-title">FARM DAILY REPORT</div>
<div class="report-date">${yyyy} ${mm} ${dd} ${dayName}</div>
<div class="report-meta">REPORT BY: ${esc(reporter)}
EGG SORTER: ${esc(sorter || "(none)")}</div>
<hr class="report-divider">`;

          // Building info block
          const heads = prod?.currentHeads ?? 0;
          const mortCount = prod?.mortalityCount ?? 0;
          const culls = prod?.culls ?? 0;
          const cases = prod?.production?.cases ?? 0;
          const trays = prod?.production?.trays ?? 0;
          const pieces = prod?.production?.totalPieces ?? 0;
          const prodPct =
            heads > 0 ? ((pieces / heads) * 100).toFixed(2) : "0.00";
          const bags = prod?.feed?.bags ?? 0;
          const feedBrand = prod?.feed?.brand || "(not specified)";
          const gpb = prod?.feed?.gramsPerBirdDay ?? "0.00";

          html += `<span class="report-bldg-header">BLDG: ${esc(b.name || _activeBuilding)}</span>
<div class="report-row"><span class="rl">BREED:</span><span class="rv">${esc(b.breed || "—")}</span></div>
<div class="report-row"><span class="rl">FLOCKMAN:</span><span class="rv">${esc(b.flockman || "—")}</span></div>
<div class="report-row"><span class="rl">AGE:</span><span class="rv">${age}</span></div>
<div class="report-row"><span class="rl">HD:</span><span class="rv">${num(heads)}</span></div>
<div class="report-row"><span class="rl">M:</span><span class="rv">${num(mortCount)}</span></div>
<div class="report-row"><span class="rl">C:</span><span class="rv">${num(culls)}</span></div>

<hr class="report-divider">
<div class="report-row"><span class="rl">PROD:</span><span class="rv">${cases}C ${trays}T</span></div>
<div class="report-row"><span class="rl">PCS:</span><span class="rv">${num(pieces)}</span></div>
<div class="report-row"><span class="rl">%:</span><span class="rv">${prodPct}%</span></div>
<div class="report-row"><span class="rl">BGS:</span><span class="rv">${bags}  |  FEED: ${esc(feedBrand)}</span></div>
<div class="report-row"><span class="rl">G:</span><span class="rv">${gpb}g</span></div>

<hr class="report-divider">
<div class="report-section-label">MEDICATIONS:</div>`;

          if (med && med.medication?.length) {
            for (const r of med.medication) {
              html += `<div class="report-row"><span class="rl">${esc(r.drug || "—")}</span><span class="rv">${esc(r.dosage || "")} ${esc(r.route || "")} x${r.qty ?? ""}</span></div>`;
              if (r.notes)
                html += `  <span class="report-none">↳ ${esc(r.notes)}</span>\n`;
            }
          } else {
            html += `<span class="report-none">(none)</span>\n`;
          }

          html += `\n<hr class="report-divider">
<div class="report-section-label">EGG SIZE SUMMARY</div>
<table class="egg-table"><thead><tr><th style="min-width:110px">SIZE</th><th style="min-width:60px">PCS</th><th>%</th></tr></thead><tbody>`;

          const dist = egg?.distribution || {};
          let eggTotalPcs = 0;
          for (const [key] of EGG_SIZES) {
            const d = dist[key] || {};
            eggTotalPcs += d.pieces ?? 0;
          }
          for (const [key, label] of EGG_SIZES) {
            const d = dist[key] || {};
            const p = d.pieces ?? 0;
            const pctEgg =
              eggTotalPcs > 0 && p > 0
                ? ((p / eggTotalPcs) * 100).toFixed(1) + "%"
                : "";
            const pVal = p > 0 ? num(p) : "";
            html += `<tr><td>${label.toUpperCase().padEnd(10)}</td><td>${pVal}</td><td>${pctEgg}</td></tr>`;
          }
          html += `<tr class="egg-total"><td>TOTAL</td><td>${eggTotalPcs > 0 ? num(eggTotalPcs) : ""}</td><td>${eggTotalPcs > 0 ? "100%" : ""}</td></tr>`;
          html += `</tbody></table>`;

          // Mortalities
          html += `<hr class="report-divider">
<div class="report-section-label">TOTAL MORTALITIES: ${num(mort?.totalMortality ?? mortCount)}</div>`;
          if (mort && mort.mortality?.length) {
            for (const r of mort.mortality) {
              html += `<div class="report-row"><span class="rl">${esc(r.cause || "Unknown")}</span><span class="rv">${r.count ?? 0}</span></div>`;
              if (r.notes)
                html += `  <span class="report-none">↳ ${esc(r.notes)}</span>\n`;
            }
          } else {
            html += `<span class="report-none">(none)</span>\n`;
          }

          // Notes
          const allNotes = [prod?.notes, mort?.notes, med?.notes].filter(
            Boolean,
          );
          html += `\n<hr class="report-divider">
<div class="report-section-label">HAPPENINGS / NOTES:</div>`;
          if (allNotes.length) {
            for (const n of allNotes) html += `${esc(n)}\n`;
          } else {
            html += `<span class="report-none">(none)</span>\n`;
          }

          // Weather
          html += `\n<hr class="report-divider">
<div class="report-section-label">WEATHER:</div>
<div class="report-row"><span class="rl">AM:</span><span class="rv">${esc(prod?.weatherAm || "")}</span></div>
<div class="report-row"><span class="rl">PM:</span><span class="rv">${esc(prod?.weatherPm || "")}</span></div>
<div class="report-row"><span class="rl">TEMP:</span><span class="rv">${esc(prod?.temperature || "")}</span></div>
</div><!-- /report-sheet -->
</div><!-- /section-pane report -->`;
        }

        // Production pane
        if (hasProd) {
          const p = prod;
          const pieces = p.production?.totalPieces ?? 0;
          const heads = p.currentHeads ?? 0;
          const prodPct =
            heads > 0 ? ((pieces / heads) * 100).toFixed(1) + "%" : "—";
          html += `<div class="section-pane${_activeSection === "production" ? " active" : ""}" data-s="production">
      <div class="data-grid">
        <div class="data-card highlight"><div class="dc-label">Total Pieces</div><div class="dc-value">${num(pieces)}</div><div class="dc-sub">${p.production?.cases ?? 0} cases, ${p.production?.trays ?? 0} trays</div></div>
        <div class="data-card highlight"><div class="dc-label">Production %</div><div class="dc-value">${prodPct}</div><div class="dc-sub">eggs per bird</div></div>
        <div class="data-card"><div class="dc-label">Current Heads</div><div class="dc-value">${num(heads)}</div></div>
        <div class="data-card${(p.mortalityCount ?? 0) > 0 ? " warning" : ""}"><div class="dc-label">Mortality</div><div class="dc-value">${num(p.mortalityCount)}</div>${(p.culls ?? 0) > 0 ? `<div class="dc-sub">${p.culls} culls</div>` : ""}</div>
        <div class="data-card"><div class="dc-label">Feed</div><div class="dc-value">${p.feed?.bags ?? 0} bags</div><div class="dc-sub">${p.feed?.gramsPerBirdDay ?? "—"} g/bird/day</div></div>
        <div class="data-card"><div class="dc-label">Feed Brand</div><div class="dc-value" style="font-size:1rem">${esc(p.feed?.brand || "—")}</div></div>
        <div class="data-card"><div class="dc-label">Weather</div><div class="dc-value" style="font-size:.95rem">AM: ${esc(p.weatherAm || "—")}</div><div class="dc-sub">PM: ${esc(p.weatherPm || "—")} &middot; ${esc(p.temperature || "—")}</div></div>
        <div class="data-card"><div class="dc-label">Reporter</div><div class="dc-value" style="font-size:1rem">${esc(p.reporter || "—")}</div></div>
      </div>
      ${p.notes ? `<div class="notes-card"><div class="notes-label">Production Notes</div>${esc(p.notes)}</div>` : ""}
    </div>`;
        }

        // Mortality pane
        if (hasMort) {
          const m = mort;
          const rows = m.mortality || [];
          html += `<div class="section-pane${_activeSection === "mortality" ? " active" : ""}" data-s="mortality">`;
          html += `<div class="data-grid" style="margin-bottom:16px">
      <div class="data-card warning"><div class="dc-label">Total Mortality</div><div class="dc-value">${num(m.totalMortality)}</div></div>
      <div class="data-card"><div class="dc-label">Reporter</div><div class="dc-value" style="font-size:1rem">${esc(m.reporter || "—")}</div></div>
    </div>`;
          if (rows.length) {
            html += `<table class="data-table"><thead><tr><th>Cause</th><th>Count</th><th>Notes</th></tr></thead><tbody>`;
            for (const r of rows)
              html += `<tr><td>${esc(r.cause || "")}</td><td>${r.count ?? 0}</td><td class="notes-cell">${esc(r.notes || "")}</td></tr>`;
            html += `</tbody></table>`;
          }
          if (m.notes)
            html += `<div class="notes-card"><div class="notes-label">Mortality Notes</div>${esc(m.notes)}</div>`;
          html += `</div>`;
        }

        // Egg Summary pane
        if (hasEgg) {
          const eg = egg;
          const dist = eg.distribution || {};
          html += `<div class="section-pane${_activeSection === "egg" ? " active" : ""}" data-s="egg">`;
          html += `<div class="data-grid" style="margin-bottom:16px">
      <div class="data-card highlight"><div class="dc-label">Total Egg Pieces</div><div class="dc-value">${num(eg.totalPieces)}</div></div>
      <div class="data-card"><div class="dc-label">Total Trays</div><div class="dc-value">${num(eg.totalTrays)}</div></div>
      ${eg.eggSorter ? `<div class="data-card"><div class="dc-label">Egg Sorter</div><div class="dc-value" style="font-size:1rem">${esc(eg.eggSorter)}</div></div>` : ""}
    </div>`;
          html += `<table class="data-table"><thead><tr><th>Egg Size</th><th>Cases</th><th>Trays</th><th>Pieces</th></tr></thead><tbody>`;
          let tC = 0,
            tT = 0,
            tP = 0;
          for (const [key, label] of EGG_SIZES) {
            const d = dist[key] || {};
            const c = d.cases ?? 0,
              t = d.trays ?? 0,
              p = d.pieces ?? 0;
            if (c || t || p) {
              html += `<tr><td>${label}</td><td>${num(c)}</td><td>${num(t)}</td><td>${num(p)}</td></tr>`;
              tC += c;
              tT += t;
              tP += p;
            }
          }
          html += `<tr class="total-row"><td>TOTAL</td><td>${num(tC)}</td><td>${num(tT)}</td><td>${num(tP)}</td></tr>`;
          html += `</tbody></table></div>`;
        }

        // Medication pane
        if (hasMed) {
          const md = med;
          const rows = md.medication || [];
          html += `<div class="section-pane${_activeSection === "medication" ? " active" : ""}" data-s="medication">`;
          html += `<div class="data-grid" style="margin-bottom:16px">
      <div class="data-card"><div class="dc-label">Medications Given</div><div class="dc-value">${rows.length}</div></div>
      <div class="data-card"><div class="dc-label">Reporter</div><div class="dc-value" style="font-size:1rem">${esc(md.reporter || "—")}</div></div>
    </div>`;
          if (rows.length) {
            html += `<table class="data-table"><thead><tr><th>Drug</th><th>Dosage</th><th>Route</th><th>Qty</th><th>Notes</th></tr></thead><tbody>`;
            for (const r of rows)
              html += `<tr><td><strong>${esc(r.drug || "")}</strong></td><td>${esc(r.dosage || "")}</td><td>${esc(r.route || "")}</td><td>${r.qty ?? ""}</td><td class="notes-cell">${esc(r.notes || "")}</td></tr>`;
            html += `</tbody></table>`;
          }
          if (md.notes)
            html += `<div class="notes-card"><div class="notes-label">Medication Notes</div>${esc(md.notes)}</div>`;
          html += `</div>`;
        }

        if (!hasProd && !hasMort && !hasEgg && !hasMed) {
          html += `<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">No entries recorded for this building on this date.</div></div>`;
        }

        el.innerHTML = html;

        // Wire section tabs
        el.querySelectorAll(".section-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            _activeSection = btn.dataset.s;
            el.querySelectorAll(".section-tab").forEach((t) =>
              t.classList.toggle("active", t.dataset.s === _activeSection),
            );
            el.querySelectorAll(".section-pane").forEach((p) =>
              p.classList.toggle("active", p.dataset.s === _activeSection),
            );
          });
        });
      }

      /* ── Master render ── */
      function render(data) {
        _data = data;
        const syncEl = document.getElementById("sync-time");
        if (data.syncedAt)
          syncEl.textContent =
            "Synced " + new Date(data.syncedAt).toLocaleString();

        if (!data.entries?.length) {
          document.getElementById("summary-strip").innerHTML = "";
          document.getElementById("building-tabs").innerHTML = "";
          document.getElementById("building-content").innerHTML =
            `<div class="empty-state"><div class="empty-icon">&#128466;</div><div class="empty-text">No entries for this date yet.</div></div>`;
          document.getElementById("building-count").textContent = "";
          return;
        }

        // Auto-select first available section for active building
        const byBuilding = groupByBuilding(data);
        if (_activeBuilding && byBuilding[_activeBuilding]) {
          const entries = byBuilding[_activeBuilding];
          const hasAnyEntry = entries.length > 0;
          // Default to report tab if there's any data
          if (_activeSection === "report" && hasAnyEntry) {
            // keep report
          } else {
            const has = (s) =>
              entries.some(
                (e) =>
                  e.type === s || (s === "egg" && e.type === "egg-summary"),
              );
            if (
              !has(_activeSection === "egg" ? "egg-summary" : _activeSection)
            ) {
              _activeSection = "report";
            }
          }
        }

        renderSummary(data);
        renderBuildingTabs(data);
        renderBuildingContent(data);
      }

      /* ── Init ── */
      async function init() {
        const manifest = await loadManifest();
        const sel = document.getElementById("date-select");
        sel.innerHTML = "";

        if (!manifest.dates.length) {
          sel.innerHTML = "<option>No data yet</option>";
          document.getElementById("summary-strip").innerHTML = "";
          document.getElementById("building-tabs").innerHTML = "";
          document.getElementById("building-content").innerHTML =
            `<div class="empty-state"><div class="empty-icon">&#128466;</div><div class="empty-text">No data has been synced yet.<br>Use the <strong>Sync Data</strong> button in LayerHub to push data here.</div></div>`;
          return;
        }

        for (const d of manifest.dates) {
          const opt = document.createElement("option");
          opt.value = d;
          opt.textContent = d;
          sel.appendChild(opt);
        }

        async function loadSelected() {
          document.getElementById("building-content").innerHTML =
            `<div class="loading-state"><div class="spinner"></div>Loading data…</div>`;
          try {
            render(await loadDay(sel.value));
          } catch {
            document.getElementById("building-content").innerHTML =
              `<div class="empty-state"><div class="empty-icon">&#9888;</div><div class="empty-text">Failed to load data.</div></div>`;
          }
        }

        sel.addEventListener("change", loadSelected);

        // Prev / Next buttons
        document.getElementById("btn-prev").addEventListener("click", () => {
          if (sel.selectedIndex < sel.options.length - 1) {
            sel.selectedIndex++;
            loadSelected();
          }
        });
        document.getElementById("btn-next").addEventListener("click", () => {
          if (sel.selectedIndex > 0) {
            sel.selectedIndex--;
            loadSelected();
          }
        });

        await loadSelected();
      }

      init();
    </script>
  </body>
</html>
