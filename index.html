<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LayerHub Dashboard</title>
    <style>
      :root {
        --clr: #16a34a;
        --clr-dark: #15803d;
        --clr-light: #dcfce7;
        --clr-bg: #f0fdf4;
        --bg: #f8fafc;
        --card: #fff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --radius: 12px;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08);
        --sidebar-w: 240px;
        --topbar-h: 94px;
        font-size: 15px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
      }

      /* Top bar */
      .topbar {
        background: linear-gradient(
          135deg,
          #15803d 0%,
          #16a34a 50%,
          #22c55e 100%
        );
        color: #fff;
        height: var(--topbar-h);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        box-shadow: 0 2px 8px rgba(21, 128, 61, 0.25);
      }
      .topbar-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 20px;
        height: 52px;
        flex-shrink: 0;
      }
      .topbar-logo {
        font-size: 1.3rem;
        width: 34px;
        height: 34px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .topbar h1 {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .topbar h1 span {
        font-weight: 400;
        opacity: 0.8;
      }
      .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sync-badge {
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.73rem;
        backdrop-filter: blur(4px);
      }

      /* Layout */
      .layout {
        display: flex;
        height: calc(100vh - var(--topbar-h));
        margin-top: var(--topbar-h);
      }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        background: var(--card);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 14px 14px 8px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-header h2 {
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .sidebar-date-filter {
        display: flex;
        gap: 6px;
        padding: 0 0 6px;
      }
      .sidebar-date-filter select {
        flex: 1;
        padding: 5px 6px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.8rem;
        font-family: inherit;
        background: var(--card);
        cursor: pointer;
      }
      .sidebar-date-filter select:focus {
        outline: none;
        border-color: var(--clr);
        box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.15);
      }
      .sidebar-filter-toggle {
        display: flex;
        gap: 0;
        padding: 6px 14px 0;
      }
      .sidebar-filter-btn {
        flex: 1;
        padding: 5px 0;
        border: 1px solid var(--border);
        background: var(--card);
        font-size: 0.75rem;
        font-family: inherit;
        cursor: pointer;
        color: var(--muted);
        transition: all 0.15s;
      }
      .sidebar-filter-btn:first-child {
        border-radius: 6px 0 0 6px;
      }
      .sidebar-filter-btn:last-child {
        border-radius: 0 6px 6px 0;
        border-left: none;
      }
      .sidebar-filter-btn.active {
        background: var(--clr);
        color: #fff;
        border-color: var(--clr);
      }
      .building-list {
        list-style: none;
        flex: 1;
        overflow-y: auto;
        padding: 6px 8px;
        scrollbar-width: thin;
      }
      .building-list::-webkit-scrollbar {
        width: 5px;
      }
      .building-list::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .building-item {
        padding: 9px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.84rem;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.12s;
        margin-bottom: 2px;
        border: 1px solid transparent;
      }
      .building-item:hover {
        background: var(--clr-light);
        border-color: var(--clr);
      }
      .building-item.active {
        background: var(--clr);
        color: #fff;
        border-color: var(--clr);
        box-shadow: 0 2px 6px rgba(22, 163, 74, 0.25);
      }
      .building-item .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
        flex-shrink: 0;
      }
      .building-item.active .dot {
        background: #86efac;
      }
      .building-item.culled .dot {
        background: #fca5a5;
      }
      .building-item .bi-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .building-item .bi-badge {
        font-size: 0.65rem;
        padding: 1px 6px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.06);
        color: var(--muted);
      }
      .building-item.active .bi-badge {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
      }
      .sidebar-empty {
        padding: 30px 14px;
        text-align: center;
        color: var(--muted);
        font-size: 0.84rem;
        list-style: none;
      }

      /* Main area */
      .main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Date strip (inside topbar) */
      .date-strip {
        background: rgba(0, 0, 0, 0.12);
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 6px;
        height: 42px;
        flex-shrink: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .date-strip::-webkit-scrollbar {
        display: none;
      }
      .date-chip {
        padding: 4px 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 0.78rem;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.12s;
        color: rgba(255, 255, 255, 0.8);
      }
      .date-chip:hover {
        border-color: rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
      }
      .date-chip.active {
        background: #fff;
        color: var(--clr-dark);
        border-color: #fff;
        font-weight: 600;
      }
      .date-chip.today {
        box-shadow: inset 0 -2px 0 #fff;
      }

      /* Content scroll */
      .content-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 16px 24px 40px;
      }

      /* Summary strip */
      .summary-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }
      .summary-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        box-shadow: var(--shadow);
      }
      .summary-card .label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 3px;
      }
      .summary-card .value {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--clr-dark);
      }
      .summary-card .sub {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 1px;
      }

      /* Building header */
      .building-header {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 18px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: var(--shadow);
      }
      .building-header .bh-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--clr-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        flex-shrink: 0;
      }
      .building-header .bh-info {
        flex: 1;
      }
      .building-header .bh-name {
        font-size: 1.05rem;
        font-weight: 700;
      }
      .building-header .bh-meta {
        font-size: 0.8rem;
        color: var(--muted);
        display: flex;
        gap: 14px;
        margin-top: 3px;
        flex-wrap: wrap;
      }
      .building-header .bh-meta span {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .badge {
        font-size: 0.68rem;
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 600;
      }
      .badge-active {
        background: var(--clr-light);
        color: var(--clr-dark);
      }
      .badge-culled {
        background: #fee2e2;
        color: #dc2626;
      }

      /* Section tabs */
      .section-tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--border);
        margin-bottom: 16px;
      }
      .section-tab {
        padding: 8px 16px;
        background: none;
        border: none;
        font-size: 0.83rem;
        font-family: inherit;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .section-tab:hover {
        color: var(--text);
      }
      .section-tab.active {
        color: var(--clr-dark);
        border-bottom-color: var(--clr);
        font-weight: 600;
      }
      .section-tab .icon {
        font-size: 1rem;
      }
      .section-pane {
        display: none;
        animation: fadeIn 0.2s;
      }
      .section-pane.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* Data cards */
      .data-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }
      .data-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        box-shadow: var(--shadow);
        transition: box-shadow 0.15s;
      }
      .data-card:hover {
        box-shadow: var(--shadow-lg);
      }
      .data-card .dc-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .data-card .dc-value {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text);
      }
      .data-card .dc-sub {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .data-card.highlight {
        border-left: 3px solid var(--clr);
      }
      .data-card.warning {
        border-left: 3px solid #f59e0b;
      }

      /* Tables */
      .data-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        margin-bottom: 14px;
      }
      .data-table th {
        background: var(--clr-bg);
        color: var(--clr-dark);
        font-size: 0.73rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 8px 12px;
        text-align: left;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .data-table td {
        padding: 8px 12px;
        font-size: 0.83rem;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: top;
      }
      .data-table tbody tr:last-child td {
        border-bottom: none;
      }
      .data-table tbody tr:hover {
        background: #fafffe;
      }
      .data-table .total-row {
        background: var(--clr-bg);
        font-weight: 700;
      }
      .data-table .total-row td {
        border-top: 2px solid var(--clr);
        color: var(--clr-dark);
      }
      .data-table .notes-cell {
        max-width: 200px;
        color: var(--muted);
        font-style: italic;
      }

      /* Notes card */
      .notes-card {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: var(--radius);
        padding: 12px 16px;
        margin-bottom: 14px;
        font-size: 0.83rem;
        line-height: 1.5;
      }
      .notes-card .notes-label {
        font-weight: 600;
        color: #92400e;
        margin-bottom: 3px;
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      /* Report sheet */
      .report-sheet {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 20px 24px;
        font-family: "Consolas", "Courier New", "Liberation Mono", monospace;
        font-size: 0.86rem;
        line-height: 1.4;
        color: var(--text);
        max-width: 700px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .report-sheet .report-title {
        text-align: center;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--clr-dark);
        margin-bottom: 0;
      }
      .report-sheet .report-date {
        text-align: center;
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 0;
        color: var(--text);
      }
      .report-sheet .report-meta {
        margin-bottom: 0;
        color: var(--muted);
      }
      .report-sheet .report-divider {
        border: none;
        margin: 2px 0;
        height: 0;
      }
      .report-sheet .report-section-label {
        font-weight: 700;
        color: var(--clr-dark);
        margin-top: 0;
        margin-bottom: 0;
      }
      .report-sheet .report-bldg-header {
        font-weight: 700;
        font-size: 0.92rem;
        color: var(--clr-dark);
        display: inline-block;
      }
      .report-sheet .report-row {
        display: flex;
        gap: 4px;
      }
      .report-sheet .report-row .rl {
        min-width: 110px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .report-sheet .report-row .rv {
        font-weight: 600;
      }
      .report-sheet .egg-table {
        width: 100%;
        border-collapse: collapse;
        margin: 2px 0 4px;
        font-family: inherit;
        font-size: 0.82rem;
      }
      .report-sheet .egg-table th {
        text-align: left;
        font-weight: 700;
        color: var(--clr-dark);
        border-bottom: none;
        padding: 2px 8px 2px 0;
      }
      .report-sheet .egg-table td {
        padding: 1px 8px 1px 0;
        border-bottom: none;
      }
      .report-sheet .egg-table .egg-total td {
        font-weight: 700;
        color: var(--clr-dark);
      }
      .report-sheet .report-none {
        color: #94a3b8;
        font-style: italic;
      }

      /* Empty / Loading */
      .empty-state {
        text-align: center;
        padding: 50px 20px;
      }
      .empty-state .empty-icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
        opacity: 0.4;
      }
      .empty-state .empty-text {
        color: var(--muted);
        font-size: 0.9rem;
        max-width: 400px;
        margin: 0 auto;
      }
      .loading-state {
        text-align: center;
        padding: 60px 20px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border);
        border-top-color: var(--clr);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Print */
      @media print {
        .topbar,
        .sidebar,
        .date-strip,
        .section-tabs {
          display: none !important;
        }
        .layout {
          display: block;
          height: auto;
          margin-top: 0;
        }
        .main-area {
          overflow: visible;
        }
        .content-scroll {
          overflow: visible;
          padding: 0;
        }
        .report-sheet {
          box-shadow: none !important;
          border: none !important;
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .layout {
          margin-top: var(--topbar-h);
        }
        .summary-strip {
          grid-template-columns: repeat(2, 1fr);
        }
        .data-grid {
          grid-template-columns: 1fr 1fr;
        }
        .building-header .bh-meta {
          gap: 8px;
        }
        .data-table th,
        .data-table td {
          padding: 6px 8px;
        }
      }
      @media (max-width: 480px) {
        .summary-strip {
          grid-template-columns: 1fr;
        }
        .data-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-row">
        <div class="topbar-logo">&#129361;</div>
        <h1>LayerHub <span>Dashboard</span></h1>
        <div class="topbar-right">
          <span class="sync-badge" id="sync-time">&mdash;</span>
        </div>
      </div>
      <div class="date-strip" id="date-strip"></div>
    </header>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Buildings</h2>
          <div class="sidebar-date-filter">
            <select id="sel-year"></select>
            <select id="sel-month"></select>
          </div>
        </div>
        <div class="sidebar-filter-toggle">
          <button class="sidebar-filter-btn active" data-filter="active">
            Active
          </button>
          <button class="sidebar-filter-btn" data-filter="culled">
            Culled
          </button>
        </div>
        <ul class="building-list" id="building-list"></ul>
      </aside>

      <!-- Main area -->
      <div class="main-area">
        <!-- Scrollable content -->
        <div class="content-scroll" id="content-scroll">
          <div class="summary-strip" id="summary-strip"></div>
          <div id="building-content"></div>
        </div>
      </div>
    </div>

    <script>
      var dataDir = "data";
      var EGG_SIZES = [
        ["nnv", "NNV"],
        ["nv", "NV"],
        ["no_weight", "No Weight"],
        ["pullet", "Pullet"],
        ["pewee", "Pewee"],
        ["small", "Small"],
        ["medium", "Medium"],
        ["large", "Large"],
        ["larger", "Larger"],
        ["xlarge", "X-Large"],
        ["jumbo", "Jumbo"],
        ["s_jumbo", "S-Jumbo"],
        ["broken", "Broken"],
        ["bold", "Bold"],
        ["loss", "Loss"],
        ["reject", "Reject"],
        ["good_cracks", "Good Cracks"],
        ["bad_cracks", "Bad Cracks"],
        ["misshapen", "Misshapen"],
      ];

      var _manifest = { dates: [] };
      var _data = null;
      var _activeBuilding = null;
      var _activeSection = "report";
      var _activeDateIdx = 0;
      var _buildingFilter = "active";

      function esc(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function num(n) {
        return (n == null ? 0 : n).toLocaleString();
      }

      async function loadManifest() {
        try {
          var r = await fetch(dataDir + "/manifest.json");
          if (!r.ok) throw 0;
          return await r.json();
        } catch (e) {
          return { dates: [] };
        }
      }
      async function loadDay(d) {
        var r = await fetch(dataDir + "/" + d + ".json");
        if (!r.ok) throw 0;
        return await r.json();
      }

      function groupByBuilding(data) {
        var g = {};
        for (var i = 0; i < data.entries.length; i++) {
          var e = data.entries[i];
          if (!g[e.buildingId]) g[e.buildingId] = [];
          g[e.buildingId].push(e);
        }
        return g;
      }
      function buildingMap(data) {
        var m = {};
        var bl = data.buildings || [];
        for (var i = 0; i < bl.length; i++) m[bl[i].id] = bl[i];
        return m;
      }

      /* Date strip */
      function renderDateStrip() {
        var el = document.getElementById("date-strip");
        if (!_manifest.dates.length) {
          el.innerHTML = "";
          return;
        }
        var today = new Date().toISOString().slice(0, 10);
        var html = "";
        for (var i = 0; i < _manifest.dates.length; i++) {
          var d = _manifest.dates[i];
          var cls = "date-chip";
          if (i === _activeDateIdx) cls += " active";
          if (d === today) cls += " today";
          html +=
            '<button class="' +
            cls +
            '" data-idx="' +
            i +
            '">' +
            d +
            "</button>";
        }
        el.innerHTML = html;
        el.querySelectorAll(".date-chip").forEach(function (btn) {
          btn.addEventListener("click", function () {
            _activeDateIdx = parseInt(btn.dataset.idx);
            loadAndRender();
          });
        });
        var active = el.querySelector(".date-chip.active");
        if (active)
          active.scrollIntoView({ block: "nearest", inline: "center" });
      }

      /* Year/Month filter */
      function monthName(m) {
        var names = [
          "",
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        return names[parseInt(m)] || m;
      }

      function populateYearMonth() {
        var selY = document.getElementById("sel-year");
        var selM = document.getElementById("sel-month");
        if (!_manifest.dates.length) {
          selY.innerHTML = "<option>\u2014</option>";
          selM.innerHTML = "<option>\u2014</option>";
          return;
        }
        var years = [],
          i;
        for (i = 0; i < _manifest.dates.length; i++) {
          var y = _manifest.dates[i].slice(0, 4);
          if (years.indexOf(y) < 0) years.push(y);
        }
        var activeDate = _manifest.dates[_activeDateIdx] || _manifest.dates[0];
        var activeYear = activeDate.slice(0, 4);
        var activeMonth = activeDate.slice(5, 7);
        var yhtml = "";
        for (i = 0; i < years.length; i++)
          yhtml +=
            '<option value="' +
            years[i] +
            '"' +
            (years[i] === activeYear ? " selected" : "") +
            ">" +
            years[i] +
            "</option>";
        selY.innerHTML = yhtml;
        var months = [];
        for (i = 0; i < _manifest.dates.length; i++) {
          if (_manifest.dates[i].indexOf(activeYear) === 0) {
            var mo = _manifest.dates[i].slice(5, 7);
            if (months.indexOf(mo) < 0) months.push(mo);
          }
        }
        var mhtml = "";
        for (i = 0; i < months.length; i++)
          mhtml +=
            '<option value="' +
            months[i] +
            '"' +
            (months[i] === activeMonth ? " selected" : "") +
            ">" +
            monthName(months[i]) +
            "</option>";
        selM.innerHTML = mhtml;
      }

      function onYearMonthChange() {
        var y = document.getElementById("sel-year").value;
        var m = document.getElementById("sel-month").value;
        var prefix = y + "-" + m;
        var idx = -1;
        for (var i = 0; i < _manifest.dates.length; i++) {
          if (_manifest.dates[i].indexOf(prefix) === 0) {
            idx = i;
            break;
          }
        }
        if (idx >= 0) {
          _activeDateIdx = idx;
          loadAndRender();
        } else {
          populateYearMonth();
        }
      }

      /* Building list */
      function renderBuildingList() {
        var el = document.getElementById("building-list");
        if (!_data || !_data.entries || !_data.entries.length) {
          el.innerHTML =
            '<li class="sidebar-empty">No data for this date.</li>';
          return;
        }
        var byBuilding = groupByBuilding(_data);
        var bMap = buildingMap(_data);
        var ids = Object.keys(byBuilding);
        if (!ids.length) {
          el.innerHTML = '<li class="sidebar-empty">No buildings.</li>';
          return;
        }
        var filtered = [];
        for (var i = 0; i < ids.length; i++) {
          var bb = bMap[ids[i]] || {};
          if (_buildingFilter === "culled") {
            if (bb.culledAt) filtered.push(ids[i]);
          } else {
            if (!bb.culledAt) filtered.push(ids[i]);
          }
        }
        if (!filtered.length) {
          el.innerHTML =
            '<li class="sidebar-empty">No ' +
            esc(_buildingFilter) +
            " buildings.</li>";
          if (ids.indexOf(_activeBuilding) < 0) _activeBuilding = ids[0];
          return;
        }
        if (!_activeBuilding || filtered.indexOf(_activeBuilding) < 0)
          _activeBuilding = filtered[0];
        var html = "";
        for (var j = 0; j < filtered.length; j++) {
          var id = filtered[j];
          var b = bMap[id] || {};
          var active = id === _activeBuilding ? " active" : "";
          var culled = b.culledAt ? " culled" : "";
          var prod = null;
          var bEntries = byBuilding[id] || [];
          for (var k = 0; k < bEntries.length; k++) {
            if (bEntries[k].type === "production") {
              prod = bEntries[k];
              break;
            }
          }
          var heads = prod ? prod.currentHeads || "" : b.startingHeads || "";
          html +=
            '<li class="building-item' +
            active +
            culled +
            '" data-id="' +
            id +
            '"><span class="dot"></span><span class="bi-name">' +
            esc(b.name || id) +
            "</span>" +
            (heads ? '<span class="bi-badge">' + num(heads) + "</span>" : "") +
            "</li>";
        }
        el.innerHTML = html;
        el.querySelectorAll(".building-item").forEach(function (li) {
          li.addEventListener("click", function () {
            _activeBuilding = li.dataset.id;
            _activeSection = "report";
            renderBuildingList();
            renderBuildingContent();
          });
        });
      }

      /* Summary strip */
      function renderSummary(data) {
        var el = document.getElementById("summary-strip");
        var prods = [],
          eggs = [];
        for (var i = 0; i < data.entries.length; i++) {
          if (data.entries[i].type === "production")
            prods.push(data.entries[i]);
          if (data.entries[i].type === "egg-summary")
            eggs.push(data.entries[i]);
        }
        var totalPieces = 0,
          totalHeads = 0,
          totalMort = 0,
          totalFeed = 0,
          totalEggPcs = 0;
        var bldgSet = {};
        for (var j = 0; j < prods.length; j++) {
          var p = prods[j];
          totalPieces +=
            p.production && p.production.totalPieces
              ? p.production.totalPieces
              : 0;
          totalHeads += p.currentHeads || 0;
          totalMort += p.mortalityCount || 0;
          totalFeed += p.feed && p.feed.bags ? p.feed.bags : 0;
          bldgSet[p.buildingId] = 1;
        }
        for (var k = 0; k < eggs.length; k++)
          totalEggPcs += eggs[k].totalPieces || 0;
        var pct =
          totalHeads > 0
            ? ((totalPieces / totalHeads) * 100).toFixed(1)
            : "\u2014";
        var buildings = Object.keys(bldgSet).length;
        el.innerHTML =
          '<div class="summary-card"><div class="label">Total Production</div><div class="value">' +
          num(totalPieces) +
          '</div><div class="sub">' +
          buildings +
          " bldg" +
          (buildings !== 1 ? "s" : "") +
          "</div></div>" +
          '<div class="summary-card"><div class="label">Prod Rate</div><div class="value">' +
          pct +
          '%</div><div class="sub">hen-day</div></div>' +
          '<div class="summary-card"><div class="label">Heads</div><div class="value">' +
          num(totalHeads) +
          '</div><div class="sub">current</div></div>' +
          '<div class="summary-card"><div class="label">Mortality</div><div class="value">' +
          num(totalMort) +
          '</div><div class="sub">today</div></div>' +
          '<div class="summary-card"><div class="label">Feed</div><div class="value">' +
          num(totalFeed) +
          '</div><div class="sub">bags</div></div>' +
          '<div class="summary-card"><div class="label">Eggs Sorted</div><div class="value">' +
          num(totalEggPcs) +
          '</div><div class="sub">pcs</div></div>';
      }

      /* Building content */
      function renderBuildingContent() {
        var data = _data;
        var el = document.getElementById("building-content");
        if (
          !data ||
          !data.entries ||
          !data.entries.length ||
          !_activeBuilding
        ) {
          el.innerHTML =
            '<div class="empty-state"><div class="empty-icon">&#128466;</div><div class="empty-text">No entries for this date.</div></div>';
          return;
        }
        var byBuilding = groupByBuilding(data);
        var bMap = buildingMap(data);
        var entries = byBuilding[_activeBuilding] || [];
        var b = bMap[_activeBuilding] || {};

        var prod = null,
          mort = null,
          egg = null,
          med = null;
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].type === "production") prod = entries[i];
          if (entries[i].type === "mortality") mort = entries[i];
          if (entries[i].type === "egg-summary") egg = entries[i];
          if (entries[i].type === "medication") med = entries[i];

        var hasProd = !!prod;
        var hasMort = !!(
          mort &&
          ((mort.mortality && mort.mortality.length) || mort.notes)

        var hasEgg = !!egg;
        var hasMed = !!(
          med &&
          ((med.medication && med.medication.length) || med.notes)

        var hasAny = hasProd || hasMort || hasEgg || hasMed;

        if (_activeSection !== "report") {

        // Building header
        html +=

          '<div class="bh-name">' +

          '<div class="bh-meta"><span>&#129415; ' +

        // Section tabs

        if (hasProd)
          html +=
            '<button class="section-tab' +
            (_activeSection === "production" ? " active" : "") +
            '" data-s="production"><span class="icon">&#128202;</span>Production</button>';
        if (hasEgg)
          html +=
            '<button class="section-tab' +
            (_activeSection === "egg" ? " active" : "") +
            '" data-s="egg"><span class="icon">&#129370;</span>Egg Summary</button>';
        if (hasMort)

            '<button class="section-tab' +

          html +=
            '<button class="section-tab' +
            (_activeSection === "medication" ? " active" : "") +

        /* ── REPORT PANE ── */
        if (hasAny) {
          var dateObj = data.date

          var yyyy = dateObj.getFullYear();
          var mm = String(dateObj.getMonth() + 1).padStart(2, "0");
          var dd = String(dateObj.getDate()).padStart(2, "0");
          var dayName = dayNames[dateObj.getDay()];
          var reporter =
            (prod && prod.reporter) ||
            (mort && mort.reporter) ||

          var sorter = (prod && prod.eggSorter) || (egg && egg.eggSorter) || "";
          var heads = prod ? prod.currentHeads || 0 : 0;
          var mortCount = prod ? prod.mortalityCount || 0 : 0;
          var culls = prod ? prod.culls || 0 : 0;
          var cases = prod && prod.production ? prod.production.cases || 0 : 0;
          var trays = prod && prod.production ? prod.production.trays || 0 : 0;
          var pieces =
            prod && prod.production ? prod.production.totalPieces || 0 : 0;
          var prodPct =
            heads > 0 ? ((pieces / heads) * 100).toFixed(2) : "0.00";
          var bags = prod && prod.feed ? prod.feed.bags || 0 : 0;
          var feedBrand =
            prod && prod.feed && prod.feed.brand
              ? prod.feed.brand
              : "(not specified)";
          var gpb =
            prod && prod.feed ? prod.feed.gramsPerBirdDay || "0.00" : "0.00";

          html +=
            '<div class="section-pane' +
            (_activeSection === "report" ? " active" : "") +
            '" data-s="report">';
          html += '<div class="report-sheet">';
          html += '<div class="report-title">FARM DAILY REPORT</div>';
          html +=
            '<div class="report-date">' +
            yyyy +
            " " +
            mm +
            " " +
            dd +
            " " +
            dayName +
            "</div>";
          html +=
            '<div class="report-meta">REPORT BY: ' +
            esc(reporter) +
            "\nEGG SORTER: " +
            esc(sorter) +
            "</div>";
          html += '<hr class="report-divider">';
          html +=
            '<span class="report-bldg-header">BLDG: ' +
            esc(b.name || _activeBuilding) +
            "</span>";
          html +=
            '<div class="report-row"><span class="rl">BREED:</span><span class="rv">' +
            esc(b.breed || "\u2014") +
            "</span></div>";
          html +=
            '<div class="report-row"><span class="rl">FLOCKMAN:</span><span class="rv">' +
            esc(b.flockman || "\u2014") +
            "</span></div>";
          html +=
            '<div class="report-row"><span class="rl">AGE:</span><span class="rv">' +
            age +
            "</span></div>";
          html +=
            '<div class="report-row"><span class="rl">HD:</span><span class="rv">' +
            num(heads) +
            "</span></div>";
          html +=
            '<div class="report-row"><span class="rl">M:</span><span class="rv">' +
            num(mortCount) +
            "</span></div>";
          html +=
            '<div class="report-row"><span class="rl">C:</span><span class="rv">' +

          html += '\n<hr class="report-divider">';

          html += '\n<hr class="report-divider">';

          html += '\n<hr class="report-divider">';
          html += '<div class="report-section-label">EGG SIZE SUMMARY</div>';
          html +=
            '<table class="egg-table"><thead><tr><th style="min-width:110px">SIZE</th><th style="min-width:60px">PCS</th><th>%</th></tr></thead><tbody>';
          var dist = egg && egg.distribution ? egg.distribution : {};
          var eggTotalPcs = 0;
          for (var ei = 0; ei < EGG_SIZES.length; ei++) {
            var dk = dist[EGG_SIZES[ei][0]];
            eggTotalPcs += dk && dk.pieces ? dk.pieces : 0;
          }
          for (var ej = 0; ej < EGG_SIZES.length; ej++) {
            var ekey = EGG_SIZES[ej][0],
              elabel = EGG_SIZES[ej][1];
            var dp = dist[ekey] && dist[ekey].pieces ? dist[ekey].pieces : 0;
            var pctEgg =

                ? ((dp / eggTotalPcs) * 100).toFixed(1) + "%"
                : "";
            html +=
              "<tr><td>" +
              elabel.toUpperCase().padEnd(10) +

              "</td><td>" +
              pctEgg +
              "</td></tr>";
          }
          html +=
            '<tr class="egg-total"><td>TOTAL</td><td>' +

            "</td><td>" +

            "</td></tr></tbody></table>";

          html += '<hr class="report-divider">';

          if (mort && mort.notes) allNotes.push(mort.notes);
          if (med && med.notes) allNotes.push(med.notes);
          html += '\n<hr class="report-divider">';

            '<div class="report-row"><span class="rl">TEMP:</span><span class="rv">' +
            esc(prod && prod.temperature ? prod.temperature : "") +
            "</span></div>";
          html += "</div></div>";
        }

        /* ── PRODUCTION PANE ── */
        if (hasProd) {
          var pp = prod;
          var pPieces = pp.production ? pp.production.totalPieces || 0 : 0;
          var pHeads = pp.currentHeads || 0;
          var pProdPct =
            pHeads > 0 ? ((pPieces / pHeads) * 100).toFixed(1) + "%" : "\u2014";
          html +=
            '<div class="section-pane' +
            (_activeSection === "production" ? " active" : "") +

            '<div class="data-card highlight"><div class="dc-label">Total Pieces</div><div class="dc-value">' +

          html +=
            '<div class="data-card highlight"><div class="dc-label">Production %</div><div class="dc-value">' +

            '</div><div class="dc-sub">hen-day</div></div>';
          html +=
            '<div class="data-card"><div class="dc-label">Current Heads</div><div class="dc-value">' +

            '<div class="data-card"><div class="dc-label">Reporter</div><div class="dc-value" style="font-size:.95rem">' +

              "</div>";

        /* ── EGG SUMMARY PANE ── */
        if (hasEgg) {
          var eg = egg;
          var edist = eg.distribution || {};
          html +=
            '<div class="section-pane' +
            (_activeSection === "egg" ? " active" : "") +
            '" data-s="egg">';
          html += '<div class="data-grid" style="margin-bottom:14px">';
          html +=
            '<div class="data-card highlight"><div class="dc-label">Total Egg Pieces</div><div class="dc-value">' +

            "</div></div>";
          html +=
            '<div class="data-card"><div class="dc-label">Total Trays</div><div class="dc-value">' +

            "</div></div>";
          if (eg.eggSorter)
