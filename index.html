<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm JSON Dashboard</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-top">
            <h1>Farm Dashboard</h1>
            <div class="date-controls">
                <select id="year-select" class="date-dropdown"></select>
                <select id="month-select" class="date-dropdown"></select>
            </div>
        </div>
        <nav id="date-strip" class="date-strip">
            <!-- Days will be injected here -->
        </nav>
    </header>
    
    <div class="app-layout">
        <aside id="sidebar" class="sidebar">
            <h2 class="sidebar-title">Buildings</h2>
            <ul id="building-list" class="building-list">
                <!-- Buildings will be injected here -->
            </ul>
        </aside>
        
        <main class="main-content">
            <div class="tabs">
                <button id="tab-dailyreport" class="tab-btn active">Daily Report Summary</button>
                <button id="tab-eggsummary" class="tab-btn">Egg Size Summary</button>
            </div>
            
            <div id="content-area" class="content-area">
                <div id="daily-report-summary" class="tab-content active"></div>
                <div id="egg-size-summary" class="tab-content" style="display: none;"></div>
            </div>
        </main>
    </div>

    <!-- Application logic -->
    <script src="app.js"></script>
</body>
</html>
